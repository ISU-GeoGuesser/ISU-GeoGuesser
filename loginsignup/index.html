<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ReggieGuessr | Login</title>

  <!-- archivo font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800;900&display=swap"
    rel="stylesheet"
  >

  <!-- connec to css -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="auth-landing">
    <section class="auth-card">

      <p class="eyebrow">ISU Campus Challenge</p>

        <h1 class="main-title">
            <span class="title-white">Reggie</span><span class="title-red">Guessr</span>
        </h1>

      <p class="subtitle">
        A multiplayer campus guessing game built for Redbirds.
      </p>

      <p class="description">
        Study real ISU campus photos, place your pin on the map, and compete
        for the highest score.
      </p>

      <div class="button-row">
        <a href="#" class="login-button">Login</a>
        <a href="#" class="signup-button">Sign Up</a>
      </div>

      <p class="helper-text">
        Use your university email to access rooms, games, and leaderboard features.
      </p>
    </section>
  </main>
</body>
</html>
