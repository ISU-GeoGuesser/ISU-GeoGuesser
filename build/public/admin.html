<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Add Location</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        #map {
            width: 100%;
            height: 400px;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div x-data="adminApp()" class="container mx-auto px-4 py-8 max-w-4xl">
        <h1 class="text-4xl font-bold mb-2">Add New Location</h1>
        <p class="text-gray-400 mb-8">Upload an image and select coordinates on the map</p>

        <!-- Success Message -->
        <div x-show="success" x-transition class="bg-green-500 text-white p-4 rounded-lg mb-6">
            <p class="font-bold">✓ Location added successfully!</p>
            <p class="text-sm">Image URL: <span x-text="success"></span></p>
        </div>

        <!-- Error Message -->
        <div x-show="error" x-transition class="bg-red-500 text-white p-4 rounded-lg mb-6">
            <p class="font-bold">✗ Error</p>
            <p class="text-sm" x-text="error"></p>
        </div>

        <div class="bg-gray-800 rounded-xl p-6 shadow-xl">
            <!-- Image Upload Section -->
            <div class="mb-6">
                <label class="block text-lg font-semibold mb-3">1. Upload Image</label>
                
                <!-- Image Preview -->
                <div x-show="imagePreview" class="mb-4">
                    <img :src="imagePreview" class="max-h-64 rounded-lg border-2 border-gray-600" alt="Preview">
                </div>

                <!-- File Input -->
                <label class="flex items-center justify-center w-full h-32 px-4 transition bg-gray-700 border-2 border-gray-600 border-dashed rounded-lg hover:bg-gray-600 hover:border-gray-500 cursor-pointer">
                    <div class="flex flex-col items-center space-y-2">
                        <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                        </svg>
                        <span class="font-medium text-gray-400">
                            <span x-show="!imageFile">Click to upload image</span>
                            <span x-show="imageFile" x-text="imageFile?.name" class="text-green-400"></span>
                        </span>
                    </div>
                    <input type="file" class="hidden" accept="image/*" @change="handleImageUpload">
                </label>
            </div>

            <!-- Map Section -->
            <div class="mb-6">
                <label class="block text-lg font-semibold mb-3">
                    2. Select Location on Map
                    <span x-show="coords.lat && coords.lng" class="text-sm text-green-400 ml-2">
                        (Lat: <span x-text="coords.lat.toFixed(6)"></span>, Lng: <span x-text="coords.lng.toFixed(6)"></span>)
                    </span>
                </label>
                <div id="map"></div>
                <p class="text-sm text-gray-400 mt-2">Click anywhere on the map to set the location</p>
            </div>

            <!-- Manual Coordinate Input -->
            <div class="mb-6 grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Latitude</label>
                    <input 
                        type="number" 
                        step="any" 
                        x-model="coords.lat"
                        @input="updateMarkerFromInput()"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500"
                        placeholder="e.g., 42.3601">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Longitude</label>
                    <input 
                        type="number" 
                        step="any" 
                        x-model="coords.lng"
                        @input="updateMarkerFromInput()"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500"
                        placeholder="e.g., -71.0942">
                </div>
            </div>

            <!-- Submit Button -->
            <button 
                @click="submitLocation()"
                :disabled="!imageFile || !coords.lat || !coords.lng || uploading"
                :class="(!imageFile || !coords.lat || !coords.lng || uploading) ? 'opacity-50 cursor-not-allowed' : 'hover:bg-green-600'"
                class="w-full bg-green-500 text-white font-bold py-3 px-6 rounded-lg transition">
                <span x-show="!uploading">Add Location</span>
                <span x-show="uploading">Uploading...</span>
            </button>
        </div>
    </div>

    <script>
    const API = ''; // Empty string = relative URLs (works with localhost and ngrok)

    function adminApp() {
        return {
            map: null,
            marker: null,
            imageFile: null,
            imagePreview: null,
            coords: { lat: null, lng: null },
            uploading: false,
            success: null,
            error: null,

            init() {
                this.initMap();
            },

            initMap() {
                // Initialize map centered on US
                this.map = L.map('map').setView([39.8283, -98.5795], 4);
                
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors'
                }).addTo(this.map);

                // Click handler for map
                this.map.on('click', (e) => {
                    this.coords.lat = e.latlng.lat;
                    this.coords.lng = e.latlng.lng;
                    this.updateMarker(e.latlng);
                });
            },

            updateMarker(latlng) {
                if (this.marker) {
                    this.marker.setLatLng(latlng);
                } else {
                    this.marker = L.marker(latlng).addTo(this.map);
                }
            },

            updateMarkerFromInput() {
                if (this.coords.lat && this.coords.lng) {
                    const latlng = L.latLng(parseFloat(this.coords.lat), parseFloat(this.coords.lng));
                    this.updateMarker(latlng);
                    this.map.panTo(latlng);
                }
            },

            handleImageUpload(event) {
                const file = event.target.files[0];
                if (file) {
                    this.imageFile = file;
                    
                    // Create preview
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.imagePreview = e.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            },

            async submitLocation() {
                this.uploading = true;
                this.error = null;
                this.success = null;

                try {
                    // Create FormData for file upload
                    const formData = new FormData();
                    formData.append('image', this.imageFile);
                    formData.append('lat', this.coords.lat);
                    formData.append('lng', this.coords.lng);

                    const response = await fetch(`${API}/api/admin/location`, {
                        method: 'POST',
                        body: formData
                    });

                    const result = await response.json();

                    if (response.ok) {
                        this.success = result.image_url;
                        
                        // Reset form
                        this.imageFile = null;
                        this.imagePreview = null;
                        this.coords = { lat: null, lng: null };
                        if (this.marker) {
                            this.map.removeLayer(this.marker);
                            this.marker = null;
                        }

                        // Clear success message after 5 seconds
                        setTimeout(() => { this.success = null; }, 5000);
                    } else {
                        this.error = result.error || 'Failed to add location';
                    }
                } catch (err) {
                    this.error = 'Network error: ' + err.message;
                } finally {
                    this.uploading = false;
                }
            }
        };
    }
    </script>
</body>
</html>
