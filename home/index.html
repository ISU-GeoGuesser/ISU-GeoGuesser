<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReggieGuessr — How well do you know campus?</title>
    <meta name="description" content="ReggieGuessr is a GeoGuessr-style game for the Illinois State University campus. Get dropped somewhere on the Quad, drop a pin, and guess where you are." />

   
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <img
        class="hero-photo"
        src="images/campus-quad.jpg"
        alt="Students sprawled on the Quad lawn in front of Illinois State's red-brick halls on a cloudy spring afternoon"
    />
    <div class="hero-scrim" aria-hidden="true"></div>

    <header class="site-header">
        <a class="brand" href="#" aria-label="ReggieGuessr home">
            <svg class="brand__pin" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" focusable="false">
                <path d="M12 1.5c-4.4 0-8 3.5-8 7.9 0 5.6 7.1 13.1 7.4 13.4a.8.8 0 0 0 1.2 0c.3-.3 7.4-7.8 7.4-13.4 0-4.4-3.6-7.9-8-7.9z" fill="currentColor"/>
                <circle cx="12" cy="9.4" r="3" fill="#fff"/>
            </svg>
            <span class="brand__name">Reggie<span class="brand__accent">Guessr</span></span>
        </a>

        <a class="btn btn--ghost" href="#" data-action="login">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
                <path d="M10 17l5-5-5-5M15 12H3M21 4v16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Log in
        </a>
    </header>

    <main class="hero">
        <p class="hero__kicker">Illinois State University</p>

        <h1 class="hero__title">
            <span class="hero__word">Reggie</span><span class="hero__word hero__word--accent">Guessr</span>
        </h1>

        <p class="hero__tagline">
            Test your knowledge of the ISU campus with
             this GeoGuessr style game played on the ISU campus.
        </p>

        <div class="hero__actions">
            <a class="btn btn--primary" href="#" data-action="multiplayer">
                <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" focusable="false">
                    <path d="M16 14a4 4 0 1 0-3.2-1.6M8 14a4 4 0 1 0-3.2-1.6M2 21v-1a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v1M14.5 16h3.5a4 4 0 0 1 4 4v1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Multiplayer
            </a>
            <a class="btn btn--solid" href="#" data-action="singleplayer">
                <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" focusable="false">
                    <circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M5 21v-1a5 5 0 0 1 5-5h4a5 5 0 0 1 5 5v1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                Single Player
            </a>
        </div>

    </main>

    <footer class="site-footer">
        <span>IT&nbsp;391 Directed Project</span>
        <span class="site-footer__dot" aria-hidden="true">&bull;</span>
        <span>A GeoGuessr for the ISU campus</span>
    </footer>

    <script>
        // Single Player jumps straight into a game; Multiplayer opens a
        // lobby whose link you share. Login is still a placeholder until
        // the auth branch lands.
        async function startGame(solo) {
            var res = await fetch('/games/start?rounds=5');
            var game = await res.json();
            location.href = '/game/?id=' + game.id + (solo ? '&solo=1' : '');
        }

        document.querySelectorAll('[data-action]').forEach(function (el) {
            el.addEventListener('click', function (e) {
                e.preventDefault();
                var action = el.dataset.action;
                if (action === 'singleplayer' || action === 'multiplayer') {
                    startGame(action === 'singleplayer').catch(function () {
                        alert('Could not reach the game server. Is the backend running?');
                    });
                } else {
                    console.log('action:', action, '(not wired up yet)');
                }
            });
        });
    </script>
</body>
</html>
